<div class="app-shell">
  <header class="app-header">
    <a class="brand" routerLink="/restaurant" aria-label="Food order restaurants">
      <span>FO</span>
      <div>
        <strong>Food Order App</strong>
        <small>Angular assignment</small>
      </div>
    </a>

    <nav aria-label="Main navigation">
      <a routerLink="/restaurant" routerLinkActive="active-link">Restaurants</a>
      <a routerLink="/orders" routerLinkActive="active-link">Orders</a>
    </nav>

    <div class="header-actions">
      @if (authService.currentUser(); as user) {
        <span class="user-chip">{{ user.name }}</span>
        <button type="button" class="auth-link" (click)="logout()">Logout</button>
      } @else {
        <a class="auth-link" routerLink="/login" routerLinkActive="active-link">Login</a>
        <a class="auth-button" routerLink="/register">Register</a>
      }

      <a class="cart-link" routerLink="/orders" aria-label="Go to checkout">
        Cart
        <p-badge [value]="orderService.getItemCount()" severity="contrast" />
      </a>
    </div>
  </header>

  <main>
    <router-outlet />
  </main>
</div>
